<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terrian</title>
<meta name="description" content="Terrian — Mad Big World. Music, story, and shows.">
<link rel="stylesheet" href="/assets/site.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  html,body{height:100%}
  body.landing{height:100svh;overflow:hidden}
  .lp-poster{position:fixed;inset:0;z-index:1;background:#0d0c0b url(/assets/images/terrian-updated.png) center/cover no-repeat}
  .lp-scrim{position:fixed;inset:0;z-index:2;background:linear-gradient(180deg,rgba(20,19,18,.55) 0%,rgba(20,19,18,.18) 30%,rgba(20,19,18,.2) 60%,rgba(20,19,18,.88) 100%)}
  .lp-top{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;padding:24px 30px;gap:18px}
  .lp-support{font:700 12px/1 system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);background:var(--cream);border-radius:999px;padding:12px 20px;transition:transform .16s}
  .lp-support:hover{transform:translateY(-2px)}
  .lp-mark{display:none;line-height:0}
  .lp-mark img{width:112px;height:auto;filter:drop-shadow(0 2px 14px rgba(0,0,0,.4))}
  .lp-menu-btn{display:none;align-items:center;gap:11px;background:none;border:0;color:var(--cream);font:700 12px/1 system-ui,sans-serif;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;text-shadow:0 2px 12px rgba(0,0,0,.45)}
  .lp-menu-btn .bars{display:inline-flex;flex-direction:column;gap:4px}
  .lp-menu-btn .bars i{width:26px;height:2px;background:var(--cream);display:block}
  .lp-nav{display:flex;flex-wrap:wrap;align-items:center;gap:clamp(18px,2.2vw,34px)}
  .lp-nav a{font:800 clamp(17px,1.6vw,22px)/1 system-ui,-apple-system,sans-serif; font-size: 30px; text-transform:uppercase;letter-spacing:.02em;color:var(--cream);opacity:.9;transition:opacity .2s,color .2s;}
  .lp-nav a:hover{opacity:1;color:var(--pink)}
  .lp-bottom{position:fixed;bottom:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 30px 22px}
  .lp-flinks{display:flex;gap:18px;flex-wrap:wrap}
  .lp-flinks a{color:rgba(243,241,233,.75);font-size:13px;letter-spacing:.03em}
  .lp-flinks a:hover{color:var(--cream)}
  .lp-social{display:flex;gap:20px;align-items:center}
  .lp-social a{color:var(--cream);opacity:.82;line-height:0;transition:opacity .2s,transform .2s}
  .lp-social a:hover{opacity:1;transform:translateY(-2px)}
  .lp-social svg{width:21px;height:21px}
  .lp-cp{color:rgba(243,241,233,.7);font-size:13px}
  @media (max-width:767px){
    .lp-nav{display:none}          /* horizontal nav is desktop-only */
    .lp-support{display:none}
    .lp-mark{display:block}        /* mobile: wordmark + hamburger -> vertical menu */
    .lp-menu-btn{display:inline-flex}
    .lp-bottom{flex-direction:column;gap:14px;padding-bottom:calc(var(--status-h) + 78px)}
    .lp-cp{order:3}
  }
</style>
</head>
<body class="landing" data-page="landing" data-chrome="off" data-footer="none" data-status="Mad Big World — Out Now">
  <div id="site-preloader"><div class="pl-wm"></div></div>

  <div class="lp-poster"></div>
  <div class="lp-scrim"></div>

  <div class="lp-top">
    <a class="lp-mark" href="/home/" data-nl aria-label="Terrian home"><img src="/assets/images/terrian-script-logo.png" alt="Terrian"></a>
    <nav class="lp-nav" aria-label="Main menu">
      <a href="/home/" data-nl>Home</a>
      <a href="/music/" data-nl>Music</a>
      <a href="/blog/" data-nl>Blog</a>
      <a href="/tour/" data-nl>Tour</a>
      <a href="/shop/" data-nl>Shop</a>
    </nav>
    <a class="lp-support" href="https://angelstreetmemphis.org/" target="_blank" rel="noopener">Support AngelStreet</a>
    <button class="lp-menu-btn" id="lpMenuBtn" aria-label="Open menu">Menu <span class="bars"><i></i><i></i></span></button>
  </div>

  <div class="lp-bottom">
    <nav class="lp-flinks">
      <a href="/legal/" data-nl>Legal</a><a href="/privacy/" data-nl>Privacy</a><a href="/booking/" data-nl>Booking</a><a href="/branding/" data-nl>Branding</a>
    </nav>
    <div class="lp-social" id="lpSocial"></div>
    <div class="lp-cp">© 2026 Terrian</div>
  </div>

  <script src="/assets/site.js"></script>
  <script>
  (function(){
    /* social icons */
    var SOC=[
      ['Instagram','https://www.instagram.com/iamterrian','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.3"/><circle cx="17.6" cy="6.4" r="1.15" fill="currentColor" stroke="none"/></svg>'],
      ['X','https://twitter.com/iamterrian','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 2.5h3.3l-7.2 8.2L23.7 22h-6.6l-5.2-6.8L5.9 22H2.6l7.7-8.8L.9 2.5h6.8l4.7 6.2 5.5-6.2zm-1.2 17.5h1.8L6.9 4.4H5l12.7 15.6z"/></svg>'],
      ['YouTube','https://www.youtube.com/channel/UC6bWXuTerKlroiGyS_5uPBw','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.6 3.9 12 3.9 12 3.9s-7.6 0-9.4.5A3 3 0 0 0 .5 6.5 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.5 3 3 0 0 0 2.1 2.1c1.8.5 9.4.5 9.4.5s7.6 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.5zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>'],
      ['Spotify','https://open.spotify.com/artist/19TPpTWkgX13Qc2stbqVoP','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm5.5 17.3a.75.75 0 0 1-1 .25c-2.8-1.7-6.4-2.1-10.5-1.1a.75.75 0 1 1-.33-1.46c4.6-1 8.5-.55 11.6 1.32.35.22.46.68.24 1zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.2-2-8.1-2.5-11.9-1.36a.94.94 0 1 1-.55-1.8c4.3-1.3 9.7-.72 13.4 1.56.44.27.58.85.31 1.29zm.13-3.4C15.3 8.3 8.9 8.1 5.3 9.2a1.13 1.13 0 1 1-.65-2.16C8.8 5.8 15.8 6 20.2 8.6a1.13 1.13 0 0 1-1.16 1.93z"/></svg>'],
      ['Facebook','https://www.facebook.com/iamterrian','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12a12 12 0 1 0-13.9 11.9v-8.4H7.1V12h3V9.4c0-3 1.8-4.6 4.5-4.6 1.3 0 2.6.24 2.6.24v2.9h-1.4c-1.4 0-1.9.9-1.9 1.8V12h3.2l-.5 3.5h-2.7v8.4A12 12 0 0 0 24 12z"/></svg>']
    ];
    var s=document.getElementById('lpSocial');
    SOC.forEach(function(x){ var a=document.createElement('a'); a.href=x[1]; a.target='_blank'; a.rel='noopener noreferrer'; a.setAttribute('aria-label',x[0]); a.innerHTML=x[2]; s.appendChild(a); });

    /* mobile menu overlay (horizontal nav is desktop-only; mobile uses this vertical menu) */
    var socHTML=SOC.map(function(x){return '<a href="'+x[1]+'" target="_blank" rel="noopener noreferrer" aria-label="'+x[0]+'">'+x[2]+'</a>';}).join('');
    var navov=document.createElement('nav'); navov.className='navov'; navov.setAttribute('aria-label','Menu');
    navov.innerHTML='<button class="close" type="button" aria-label="Close menu">&#10005;</button>'
      +'<a class="nl" href="/home/">Home</a><a class="nl" href="/music/">Music</a><a class="nl" href="/blog/">Blog</a><a class="nl" href="/tour/">Tour</a>'
      +'<a class="nl" href="/shop/">Shop</a>'
      +'<div class="ov-social">'+socHTML+'</div>';
    document.body.appendChild(navov);
    function lpMclose(){ navov.classList.remove('open'); document.documentElement.style.overflow=''; }
    var mb=document.getElementById('lpMenuBtn');
    if(mb) mb.addEventListener('click', function(){ navov.classList.add('open'); document.documentElement.style.overflow='hidden'; });
    navov.querySelector('.close').addEventListener('click', lpMclose);
    navov.addEventListener('click', function(e){ if(e.target===navov) lpMclose(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape'||e.keyCode===27) lpMclose(); });

    /* if shown inside the desktop menu overlay iframe: links navigate the top window, and
       hide the Support button so it doesn't collide with the overlay's close button */
    if(window.top!==window.self){
      document.querySelectorAll('a[data-nl]').forEach(function(a){ if(a.getAttribute('href').indexOf('http')!==0) a.target='_top'; });
      var sup=document.querySelector('.lp-support'); if(sup) sup.style.display='none';
    }
  })();
  </script>
</body>
</html>
