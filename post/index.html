<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog | Terrian</title>
<meta name="description" content="Words from Terrian.">
<link rel="stylesheet" href="/assets/site.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  .post{max-width:720px;margin:0 auto;padding:calc(var(--chrome-h) + 40px) 0 10px;min-height:50vh}
  .post .toplink{color:var(--muted);font-size:14px;display:inline-block;margin-bottom:26px}
  .post .toplink:hover{color:var(--cream)}
  h1.title{font:italic 600 clamp(32px,6vw,54px)/1.08 Georgia,serif;letter-spacing:-.01em}
  .p-meta{color:var(--muted);font-size:14.5px;margin-top:16px;letter-spacing:.02em}
  .cover{margin:28px 0 8px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
  .cover img{width:100%;height:auto;display:block}
  .body{margin-top:26px}
  .body p{color:#e7e4da;margin:0 0 20px;font-size:18px;line-height:1.75}
  .body h2{font:600 15px/1.3 system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase;margin:34px 0 14px}
  .body h3{font:italic 600 24px/1.3 Georgia,serif;margin:28px 0 12px}
  .body blockquote{margin:24px 0;padding:6px 0 6px 22px;border-left:2px solid var(--pink);font:italic 400 21px/1.6 Georgia,serif}
  .body ul{margin:0 0 20px 22px;color:#e7e4da}.body li{margin:8px 0}
  .body a{color:var(--cream);text-decoration:underline;text-underline-offset:3px}
  .body strong{color:var(--cream)}
  .state{color:var(--muted);text-align:center;padding:70px 0}
  .backrow{margin-top:38px}
  .backrow a{color:var(--muted);font-size:14px}.backrow a:hover{color:var(--cream)}
</style>
</head>
<body data-page="blog" data-status="Blog" data-foot-cta="Want more?">
  <div id="site-preloader"><div class="pl-wm"></div></div>
  <main class="wrap"><article class="post" id="post"><p class="state">Loading…</p></article></main>
  <script src="/assets/site.js"></script>
  <script>
  (function(){
    var mount=document.getElementById('post');
    var slug=new URLSearchParams(location.search).get('slug');
    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function inline(s){ return s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>'); }
    function md(src){ var blocks=String(src).replace(/\r/g,'').split(/\n{2,}/), h='';
      blocks.forEach(function(b){ b=b.trim(); if(!b) return;
        if(/^###\s+/.test(b)){ h+='<h3>'+inline(esc(b.replace(/^###\s+/,'')))+'</h3>'; return; }
        if(/^##\s+/.test(b)){ h+='<h2>'+inline(esc(b.replace(/^##\s+/,'')))+'</h2>'; return; }
        if(/^>\s+/.test(b)){ h+='<blockquote>'+inline(esc(b.replace(/^>\s+/,'').replace(/\n>\s?/g,' ')))+'</blockquote>'; return; }
        if(/^([-*])\s+/.test(b)){ var it=b.split(/\n/).map(function(l){return l.replace(/^([-*])\s+/,'').trim();}).filter(Boolean); h+='<ul>'+it.map(function(i){return '<li>'+inline(esc(i))+'</li>';}).join('')+'</ul>'; return; }
        h+='<p>'+inline(esc(b)).replace(/\n/g,'<br>')+'</p>'; });
      return h; }
    function fmt(d){ if(!d) return ''; var p=String(d).split('-'); if(p.length!==3) return d;
      var m=['January','February','March','April','May','June','July','August','September','October','November','December'];
      return m[(+p[1]-1)]+' '+(+p[2])+', '+p[0]; }
    function readTime(b){ return Math.max(1,Math.round(String(b).trim().split(/\s+/).length/200))+' min read'; }
    function fail(msg){ mount.innerHTML='<p class="state">'+esc(msg)+'<br><br><a href="/blog/">← All posts</a></p>'; }
    if(!slug){ fail('Post not found.'); return; }
    fetch('/.netlify/functions/posts?slug='+encodeURIComponent(slug)).then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok||!d.post){ fail((d&&d.error)||'Post not found.'); return; }
      var p=d.post; document.title=p.title+' | Terrian';
      var meta=[fmt(p.date),p.author,readTime(p.body)].filter(Boolean).join('  ·  ');
      var h='<a class="toplink" href="/blog/">← All posts</a>';
      h+='<p class="eyebrow">Blog</p><h1 class="title">'+esc(p.title)+'</h1>';
      if(meta) h+='<div class="p-meta">'+esc(meta)+'</div>';
      if(p.cover) h+='<div class="cover"><img src="'+esc(p.cover)+'" alt="'+esc(p.title)+'"></div>';
      h+='<div class="body">'+md(p.body)+'</div>';
      h+='<div class="backrow"><a href="/blog/">← All posts</a></div>';
      mount.innerHTML=h;
    }).catch(function(){ fail('Could not load this post. Please try again.'); });
  })();
  </script>
</body>
</html>
